<!DOCTYPE html>
<html>
<head>
<title>Bus Ticket Reservation System</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

header{
background:#020617;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
margin-top:40px;
}

button{
padding:15px 25px;
margin:10px;
font-size:16px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
cursor:pointer;
}

button:hover{
background:#334155;
}

#console{
margin:40px auto;
width:80%;
height:300px;
background:black;
color:#00ff88;
padding:20px;
overflow:auto;
font-family:monospace;
border-radius:10px;
}

</style>

</head>

<body>

<header>
🚌 Bus Ticket Reservation System
</header>

<div class="container">

<button onclick="viewRoutes()">View Routes</button>
<button onclick="viewSeats()">View Seats</button>
<button onclick="bookSeat()">Book Ticket</button>
<button onclick="cancelSeat()">Cancel Ticket</button>
<button onclick="searchSeat()">Search Ticket</button>

</div>

<div id="console"></div>

<script>

function printToConsole(text){
document.getElementById("console").innerHTML += text + "<br>";
}

var Module = {
print: function(text){
printToConsole(text);
}
};

</script>

<script src="index.js"></script>

<script>

function viewRoutes(){
Module.ccall('viewRoutes');
}

function viewSeats(){
Module.ccall('viewSeats');
}

function bookSeat(){
var name = prompt("Enter Passenger Name");
var seat = prompt("Enter Seat Number");

Module.ccall('bookSeat',null,['string','number'],[name,seat]);
}

function cancelSeat(){
var seat = prompt("Enter Seat Number");

Module.ccall('cancelSeat',null,['number'],[seat]);
}

function searchSeat(){
var seat = prompt("Enter Seat Number");

Module.ccall('searchSeat',null,['number'],[seat]);
}

</script>

</body>
</html>
